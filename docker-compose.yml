version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: knowletter-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: knowletter
    volumes:
      - mongodb_data:/data/db
    networks:
      - knowletter-network

  mongo-express:
    image: mongo-express:latest
    container_name: knowletter-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password
      ME_CONFIG_MONGODB_URL: mongodb://admin:password@mongo:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      - mongo
    networks:
      - knowletter-network

volumes:
  mongodb_data:

networks:
  knowletter-network:
    driver: bridge
